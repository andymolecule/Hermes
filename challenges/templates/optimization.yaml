# Hermes challenge template: optimization
# The poster provides a custom scorer container that runs a simulation.
# Solvers submit parameters; the container evaluates them and returns a score.
# Run: hm post challenge.yaml --deposit 10

id: ch-004
# Short, human-readable title
title: "Optimize binding affinity for target protein"

domain: drug_discovery
# reproducibility | prediction | optimization | docking | red_team
type: optimization

description: |
  Submit parameters that maximize the objective function.
  The scorer container runs the simulation and returns the score.
  Higher scores are better.

  ## Submission format
  Submit a JSON file: {"param_a": 1.5, "param_b": 0.3, ...}
  See constraints below.

  ## Constraints
  - All parameter values must be between 0 and 10
  - Maximum 20 parameters

dataset:
  # ipfs:// or https:// URL to any reference data the solver needs
  train: "https://example.com/reference_data.tar.gz"

scoring:
  # YOUR custom scorer container
  # Must accept /input/submission.* and write /output/score.json
  # See challenges/templates/optimization-scorer/ for a starter scaffold
  container: "ghcr.io/your-org/your-scorer:v1"
  metric: custom

reward:
  total: 10
  distribution: winner_take_all

# Deadline in ISO-8601 with timezone offset
deadline: "2026-03-20T00:00:00Z"

tags:
  - optimization

# Optional settings
minimum_score: 0
# Dispute window in hours (168-2160, i.e. 7-90 days)
dispute_window_hours: 168
