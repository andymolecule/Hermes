name: Hosted Smoke

on:
  workflow_dispatch:

concurrency:
  group: hosted-smoke-main
  cancel-in-progress: false

jobs:
  hosted-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      AGORA_SUPABASE_URL: ${{ secrets.AGORA_SUPABASE_URL }}
      AGORA_SUPABASE_ANON_KEY: ${{ secrets.AGORA_SUPABASE_ANON_KEY }}
      AGORA_SUPABASE_SERVICE_KEY: ${{ secrets.AGORA_SUPABASE_SERVICE_KEY }}
      AGORA_API_URL: ${{ secrets.AGORA_API_URL }}
      AGORA_RPC_URL: ${{ secrets.AGORA_RPC_URL }}
      AGORA_CHAIN_ID: ${{ secrets.AGORA_CHAIN_ID }}
      AGORA_FACTORY_ADDRESS: ${{ secrets.AGORA_FACTORY_ADDRESS }}
      AGORA_USDC_ADDRESS: ${{ secrets.AGORA_USDC_ADDRESS }}
      AGORA_PRIVATE_KEY: ${{ secrets.AGORA_PRIVATE_KEY }}
      AGORA_ORACLE_KEY: ${{ secrets.AGORA_ORACLE_KEY }}
      AGORA_PINATA_JWT: ${{ secrets.AGORA_PINATA_JWT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm turbo build

      - name: Verify hosted runtime readiness
        run: pnpm verify:runtime

      - name: Run funded hosted smoke
        run: pnpm smoke:hosted
