name: Build Runtime Artifacts

on:
  workflow_call:
    inputs:
      release_id:
        description: "Optional runtime release id override"
        required: false
        type: string
      schema_plan:
        description: "Schema plan type for the manifest"
        required: false
        default: noop
        type: string
    outputs:
      release_id:
        description: "Resolved runtime release id"
        value: ${{ jobs.metadata.outputs.release_id }}
      git_sha:
        description: "Resolved git SHA"
        value: ${{ jobs.metadata.outputs.git_sha }}
      created_at:
        description: "Build timestamp"
        value: ${{ jobs.metadata.outputs.created_at }}
      schema_plan:
        description: "Resolved schema plan"
        value: ${{ jobs.metadata.outputs.schema_plan }}
      api_image:
        description: "Digest-pinned API image reference"
        value: ${{ jobs.manifest.outputs.api_image }}
      indexer_image:
        description: "Digest-pinned indexer image reference"
        value: ${{ jobs.manifest.outputs.indexer_image }}
      worker_image:
        description: "Digest-pinned worker image reference"
        value: ${{ jobs.manifest.outputs.worker_image }}
  workflow_dispatch:
    inputs:
      release_id:
        description: "Optional runtime release id override"
        required: false
        type: string
      schema_plan:
        description: "Schema plan type for the manifest"
        required: true
        default: noop
        type: choice
        options:
          - noop
          - forward_migration
          - bootstrap

permissions:
  contents: read
  packages: write

env:
  GHCR_NAMESPACE: andymolecule

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.meta.outputs.release_id }}
      git_sha: ${{ steps.meta.outputs.git_sha }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
      created_at: ${{ steps.meta.outputs.created_at }}
      schema_plan: ${{ steps.meta.outputs.schema_plan }}
    steps:
      - name: Resolve runtime release metadata
        id: meta
        env:
          INPUT_RELEASE_ID: ${{ inputs.release_id || github.event.inputs.release_id || '' }}
          INPUT_SCHEMA_PLAN: ${{ inputs.schema_plan || github.event.inputs.schema_plan || 'noop' }}
        run: |
          set -euo pipefail
          GIT_SHA="${GITHUB_SHA}"
          SHORT_SHA="${GIT_SHA:0:12}"
          CREATED_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          RELEASE_ID="${INPUT_RELEASE_ID:-rt_$(date -u +%Y_%m_%d)_${SHORT_SHA}}"
          echo "release_id=${RELEASE_ID}" >> "$GITHUB_OUTPUT"
          echo "git_sha=${GIT_SHA}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "created_at=${CREATED_AT}" >> "$GITHUB_OUTPUT"
          echo "schema_plan=${INPUT_SCHEMA_PLAN}" >> "$GITHUB_OUTPUT"

  build-api:
    runs-on: ubuntu-latest
    needs: metadata
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_PAT || github.token }}

      - name: Build and push API runtime image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/runtime/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            AGORA_RELEASE_ID=${{ needs.metadata.outputs.release_id }}
            AGORA_RELEASE_GIT_SHA=${{ needs.metadata.outputs.git_sha }}
            AGORA_RELEASE_CREATED_AT=${{ needs.metadata.outputs.created_at }}
            RUNTIME_BUILD_FILTER=@agora/api
            AGORA_RUNTIME_ENTRY=apps/api/dist/index.js
          tags: |
            ghcr.io/${{ env.GHCR_NAMESPACE }}/agora-api:release-${{ needs.metadata.outputs.release_id }}
            ghcr.io/${{ env.GHCR_NAMESPACE }}/agora-api:sha-${{ needs.metadata.outputs.short_sha }}
          labels: |
            org.opencontainers.image.title=agora-api
            org.opencontainers.image.version=${{ needs.metadata.outputs.release_id }}
            org.opencontainers.image.revision=${{ needs.metadata.outputs.git_sha }}
            org.opencontainers.image.created=${{ needs.metadata.outputs.created_at }}

  build-indexer:
    runs-on: ubuntu-latest
    needs: metadata
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_PAT || github.token }}

      - name: Build and push indexer runtime image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/runtime/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            AGORA_RELEASE_ID=${{ needs.metadata.outputs.release_id }}
            AGORA_RELEASE_GIT_SHA=${{ needs.metadata.outputs.git_sha }}
            AGORA_RELEASE_CREATED_AT=${{ needs.metadata.outputs.created_at }}
            RUNTIME_BUILD_FILTER=@agora/chain
            AGORA_RUNTIME_ENTRY=packages/chain/dist/indexer.js
          tags: |
            ghcr.io/${{ env.GHCR_NAMESPACE }}/agora-indexer:release-${{ needs.metadata.outputs.release_id }}
            ghcr.io/${{ env.GHCR_NAMESPACE }}/agora-indexer:sha-${{ needs.metadata.outputs.short_sha }}
          labels: |
            org.opencontainers.image.title=agora-indexer
            org.opencontainers.image.version=${{ needs.metadata.outputs.release_id }}
            org.opencontainers.image.revision=${{ needs.metadata.outputs.git_sha }}
            org.opencontainers.image.created=${{ needs.metadata.outputs.created_at }}

  build-worker:
    runs-on: ubuntu-latest
    needs: metadata
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_PAT || github.token }}

      - name: Build and push worker runtime image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/runtime/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            AGORA_RELEASE_ID=${{ needs.metadata.outputs.release_id }}
            AGORA_RELEASE_GIT_SHA=${{ needs.metadata.outputs.git_sha }}
            AGORA_RELEASE_CREATED_AT=${{ needs.metadata.outputs.created_at }}
            RUNTIME_BUILD_FILTER=@agora/api
            AGORA_RUNTIME_ENTRY=apps/api/dist/worker.js
          tags: |
            ghcr.io/${{ env.GHCR_NAMESPACE }}/agora-worker:release-${{ needs.metadata.outputs.release_id }}
            ghcr.io/${{ env.GHCR_NAMESPACE }}/agora-worker:sha-${{ needs.metadata.outputs.short_sha }}
          labels: |
            org.opencontainers.image.title=agora-worker
            org.opencontainers.image.version=${{ needs.metadata.outputs.release_id }}
            org.opencontainers.image.revision=${{ needs.metadata.outputs.git_sha }}
            org.opencontainers.image.created=${{ needs.metadata.outputs.created_at }}

  manifest:
    runs-on: ubuntu-latest
    needs:
      - metadata
      - build-api
      - build-indexer
      - build-worker
    outputs:
      api_image: ${{ steps.refs.outputs.api_image }}
      indexer_image: ${{ steps.refs.outputs.indexer_image }}
      worker_image: ${{ steps.refs.outputs.worker_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate runtime release manifest
        env:
          AGORA_RELEASE_ID: ${{ needs.metadata.outputs.release_id }}
          AGORA_RELEASE_GIT_SHA: ${{ needs.metadata.outputs.git_sha }}
          AGORA_RELEASE_CREATED_AT: ${{ needs.metadata.outputs.created_at }}
          AGORA_RUNTIME_SCHEMA_PLAN: ${{ needs.metadata.outputs.schema_plan }}
          AGORA_RUNTIME_API_IMAGE: ghcr.io/${{ env.GHCR_NAMESPACE }}/agora-api@${{ needs.build-api.outputs.digest }}
          AGORA_RUNTIME_INDEXER_IMAGE: ghcr.io/${{ env.GHCR_NAMESPACE }}/agora-indexer@${{ needs.build-indexer.outputs.digest }}
          AGORA_RUNTIME_WORKER_IMAGE: ghcr.io/${{ env.GHCR_NAMESPACE }}/agora-worker@${{ needs.build-worker.outputs.digest }}
          AGORA_RUNTIME_MANIFEST_OUTPUT: artifacts/runtime/${{ needs.metadata.outputs.release_id }}/manifest.json
        run: pnpm runtime:build

      - name: Expose image references
        id: refs
        run: |
          set -euo pipefail
          echo "api_image=ghcr.io/${{ env.GHCR_NAMESPACE }}/agora-api@${{ needs.build-api.outputs.digest }}" >> "$GITHUB_OUTPUT"
          echo "indexer_image=ghcr.io/${{ env.GHCR_NAMESPACE }}/agora-indexer@${{ needs.build-indexer.outputs.digest }}" >> "$GITHUB_OUTPUT"
          echo "worker_image=ghcr.io/${{ env.GHCR_NAMESPACE }}/agora-worker@${{ needs.build-worker.outputs.digest }}" >> "$GITHUB_OUTPUT"

      - name: Upload runtime release manifest
        uses: actions/upload-artifact@v4
        with:
          name: runtime-release-${{ needs.metadata.outputs.release_id }}
          path: artifacts/runtime/${{ needs.metadata.outputs.release_id }}/manifest.json
