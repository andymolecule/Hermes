name: Publish Scorers

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "containers/**"
      - ".github/workflows/publish-scorers.yml"
      - "packages/common/src/presets.ts"
      - "scripts/verify-official-scorers.mjs"

permissions:
  contents: read
  packages: write

env:
  GHCR_NAMESPACE: agora-science

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: repro-scorer
            context: containers/repro-scorer
          - name: regression-scorer
            context: containers/regression-scorer
          - name: docking-scorer
            context: containers/docking-scorer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_PAT || github.token }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ env.GHCR_NAMESPACE }}/${{ matrix.name }}:v1
            ghcr.io/${{ env.GHCR_NAMESPACE }}/${{ matrix.name }}:sha-${{ github.sha }}

  verify:
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @agora/common
        run: pnpm --filter @agora/common build

      - name: Verify official scorer digest resolution
        run: pnpm scorers:verify

      - name: Verify official scorer images are public and pullable
        run: |
          docker pull ghcr.io/${{ env.GHCR_NAMESPACE }}/repro-scorer:v1
          docker pull ghcr.io/${{ env.GHCR_NAMESPACE }}/regression-scorer:v1
          docker pull ghcr.io/${{ env.GHCR_NAMESPACE }}/docking-scorer:v1
