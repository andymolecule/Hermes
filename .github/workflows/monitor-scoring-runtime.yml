name: Monitor Scoring Runtime

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      AGORA_API_HEALTH_URL: ${{ vars.AGORA_API_HEALTH_URL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check orchestrator runtime alignment and sealing readiness
        id: health
        run: |
          set -euo pipefail
          AGORA_API_HEALTH_URL="${AGORA_API_HEALTH_URL:-https://agoraapi-production-2708.up.railway.app/api/health}"
          AGORA_API_BASE_URL="${AGORA_API_HEALTH_URL%/api/health}"
          AGORA_WORKER_HEALTH_URL="$AGORA_API_BASE_URL/api/worker-health"
          node scripts/ops/check-worker-health.mjs summary \
            --api-health-url "$AGORA_API_HEALTH_URL" \
            --worker-health-url "$AGORA_WORKER_HEALTH_URL" \
            --starting-grace-ms 300000

      - name: Report monitor status
        run: |
          set -euo pipefail
          echo "API runtime: ${{ steps.health.outputs.api_runtime }}"
          if [ "${{ steps.health.outputs.healthy }}" = "true" ]; then
            echo "Scoring runtime is healthy; no action required."
          elif [ "${{ steps.health.outputs.starting_within_grace }}" = "true" ]; then
            echo "Scoring runtime startup is still within grace: ${{ steps.health.outputs.summary }}"
          elif [ "${{ steps.health.outputs.needs_heal }}" = "true" ]; then
            echo "Scoring runtime requires operator attention: ${{ steps.health.outputs.summary }}"
            if [ -n "${{ steps.health.outputs.latest_error }}" ]; then
              echo "Latest worker error: ${{ steps.health.outputs.latest_error }}"
            fi
          else
            echo "Scoring runtime check completed: ${{ steps.health.outputs.summary }}"
          fi

      - name: Dump latest health payloads
        if: steps.health.outputs.needs_heal == 'true'
        run: |
          set -euo pipefail
          AGORA_API_HEALTH_URL="${AGORA_API_HEALTH_URL:-https://agoraapi-production-2708.up.railway.app/api/health}"
          AGORA_API_BASE_URL="${AGORA_API_HEALTH_URL%/api/health}"
          AGORA_WORKER_HEALTH_URL="$AGORA_API_BASE_URL/api/worker-health"
          EXPECTED_RUNTIME_VERSION="${{ steps.health.outputs.api_runtime }}"
          node scripts/ops/check-worker-health.mjs dump \
            --api-health-url "$AGORA_API_HEALTH_URL" \
            --worker-health-url "$AGORA_WORKER_HEALTH_URL" \
            --expected-runtime-version "$EXPECTED_RUNTIME_VERSION" || true

      - name: Fail when scoring runtime is unhealthy
        if: steps.health.outputs.needs_heal == 'true'
        run: |
          set -euo pipefail
          echo "Scoring runtime monitor detected an unhealthy state. Next step: inspect the Railway worker-orchestrator and executor service."
          exit 1
