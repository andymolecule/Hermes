name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify scorer containers stay code-only
        run: pnpm scorers:check

      - name: Verify runtime lane scripts parse
        run: |
          set -euo pipefail
          bash -n scripts/verify-runtime.sh scripts/reset-bomb-testnet.sh scripts/hosted-smoke.sh scripts/local-cli-smoke.sh scripts/local-lifecycle-smoke.sh scripts/local-smoke-common.sh
          node --check scripts/local-lifecycle-smoke.mjs
          node --check scripts/assert-local-smoke-env.mjs

      - name: Verify ABI sync
        run: pnpm abi:check

      - name: Build workspace
        run: pnpm build

      - name: Run tests
        run: NO_PROXY='*' pnpm test

      - name: Enforce contract coverage floor
        run: pnpm contracts:coverage:check
