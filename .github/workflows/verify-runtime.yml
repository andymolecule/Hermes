name: Verify Runtime

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/verify-runtime.yml"
      - ".github/workflows/bootstrap-testnet.yml"
      - ".github/workflows/hosted-smoke.yml"
      - "scripts/verify-runtime.sh"
      - "scripts/bootstrap-testnet.sh"
      - "scripts/hosted-smoke.sh"
      - "scripts/local-lifecycle-smoke.mjs"
      - "scripts/runtime-env.mjs"
      - "scripts/release-metadata.mjs"
      - "scripts/verify-deploy-sync.mjs"
      - "scripts/verify-runtime-schema.mjs"
      - "scripts/verify-official-scorers.mjs"
      - "apps/api/**"
      - "packages/common/**"
      - "packages/db/**"
      - "packages/chain/**"
      - "packages/scorer/**"
      - "packages/scorer-runtime/**"
      - "packages/ipfs/**"
      - "packages/contracts/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "turbo.json"
      - ".env.example"
  workflow_dispatch:

concurrency:
  group: verify-runtime-main
  cancel-in-progress: false

jobs:
  verify-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      AGORA_SUPABASE_URL: ${{ secrets.AGORA_SUPABASE_URL }}
      AGORA_SUPABASE_ANON_KEY: ${{ secrets.AGORA_SUPABASE_ANON_KEY }}
      AGORA_SUPABASE_SERVICE_KEY: ${{ secrets.AGORA_SUPABASE_SERVICE_KEY }}
      AGORA_API_URL: ${{ secrets.AGORA_API_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm turbo build

      - name: Run hosted runtime verification
        run: pnpm verify:runtime
