name: Deploy Worker (DigitalOcean)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-digitalocean-worker
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DO_WORKER_HOST: ${{ secrets.DO_WORKER_HOST }}
      DO_WORKER_USER: ${{ secrets.DO_WORKER_USER }}
      DO_WORKER_PORT: ${{ vars.DO_WORKER_PORT }}
      DO_WORKER_PATH: ${{ vars.DO_WORKER_PATH }}
      DO_WORKER_PM2_NAME: ${{ vars.DO_WORKER_PM2_NAME }}
      AGORA_API_HEALTH_URL: ${{ vars.AGORA_API_HEALTH_URL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate deploy secrets
        run: |
          set -euo pipefail
          test -n "$DO_WORKER_HOST"
          test -n "$DO_WORKER_USER"
          test -n "${{ secrets.DO_WORKER_SSH_KEY }}"

      - name: Resolve expected deploy revision
        id: runtime
        run: |
          set -euo pipefail
          EXPECTED_RUNTIME_VERSION="$(git rev-parse --short=12 HEAD)"
          test -n "$EXPECTED_RUNTIME_VERSION"
          echo "expected_runtime_version=$EXPECTED_RUNTIME_VERSION" >> "$GITHUB_OUTPUT"
          echo "Expected deploy revision: $EXPECTED_RUNTIME_VERSION"

      - name: Configure SSH
        run: |
          set -euo pipefail
          DO_WORKER_PORT="${DO_WORKER_PORT:-22}"
          install -d -m 700 ~/.ssh
          printf '%s\n' "${{ secrets.DO_WORKER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$DO_WORKER_PORT" -H "$DO_WORKER_HOST" >> ~/.ssh/known_hosts

      - name: Wait for API deploy to reach this revision
        run: |
          set -euo pipefail
          AGORA_API_HEALTH_URL="${AGORA_API_HEALTH_URL:-https://agoraapi-production-2708.up.railway.app/healthz}"
          EXPECTED_RUNTIME_VERSION="${{ steps.runtime.outputs.expected_runtime_version }}"

          for attempt in $(seq 1 40); do
            RUNTIME_VERSION="$(
              curl -fsS "$AGORA_API_HEALTH_URL" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("runtimeVersion",""))'
            )"
            if [ "$RUNTIME_VERSION" = "$EXPECTED_RUNTIME_VERSION" ]; then
              echo "API is on expected runtime version: $RUNTIME_VERSION"
              exit 0
            fi

            echo "API runtime version is '$RUNTIME_VERSION'; waiting for '$EXPECTED_RUNTIME_VERSION' before deploying worker."
            sleep 15
          done

          echo "Worker deploy aborted: API did not reach runtime version '$EXPECTED_RUNTIME_VERSION' in time."
          echo "Next step: check Railway API deploy status, then rerun the workflow."
          exit 1

      - name: Deploy worker on droplet
        run: |
          set -euo pipefail
          DO_WORKER_PORT="${DO_WORKER_PORT:-22}"
          DO_WORKER_PATH="${DO_WORKER_PATH:-/opt/agora}"
          DO_WORKER_PM2_NAME="${DO_WORKER_PM2_NAME:-agora-worker}"
          ssh -p "$DO_WORKER_PORT" "$DO_WORKER_USER@$DO_WORKER_HOST" \
            "set -euo pipefail; cd '$DO_WORKER_PATH'; if [ ! -x scripts/ops/deploy-worker.sh ]; then git fetch origin main && git checkout main && git pull --ff-only origin main; fi; export AGORA_DEPLOY_EXPECTED_SHA='${{ steps.runtime.outputs.expected_runtime_version }}' AGORA_WORKER_PM2_NAME='$DO_WORKER_PM2_NAME'; bash scripts/ops/deploy-worker.sh"

      - name: Verify worker health after deploy
        run: |
          set -euo pipefail
          AGORA_API_HEALTH_URL="${AGORA_API_HEALTH_URL:-https://agoraapi-production-2708.up.railway.app/healthz}"
          AGORA_API_BASE_URL="${AGORA_API_HEALTH_URL%/healthz}"
          AGORA_WORKER_HEALTH_URL="$AGORA_API_BASE_URL/api/worker-health"
          EXPECTED_RUNTIME_VERSION="${{ steps.runtime.outputs.expected_runtime_version }}"

          for attempt in $(seq 1 20); do
            worker_json="$(curl -fsS "$AGORA_WORKER_HEALTH_URL")"

            HEALTHY="$(
              EXPECTED_RUNTIME_VERSION="$EXPECTED_RUNTIME_VERSION" WORKER_JSON="$worker_json" node -e 'const worker = JSON.parse(process.env.WORKER_JSON ?? "{}"); const workers = worker.workers ?? {}; const sealing = worker.sealing ?? {}; const expected = String(process.env.EXPECTED_RUNTIME_VERSION ?? ""); const activeRuntime = String(workers.activeRuntimeVersion ?? ""); const healthyActive = Number(workers.healthyWorkersForActiveRuntimeVersion ?? 0); const sealingConfigured = Boolean(sealing.configured); const sealingReady = Boolean(sealing.workerReady); const healthy = activeRuntime === expected && healthyActive > 0 && (!sealingConfigured || sealingReady); process.stdout.write(healthy ? "true" : "false");'
            )"

            if [ "$HEALTHY" = "true" ]; then
              echo "Worker deploy verified on runtime $EXPECTED_RUNTIME_VERSION."
              exit 0
            fi

            echo "Worker not healthy on expected runtime yet ($attempt/20). Waiting 15s..."
            sleep 15
          done

          echo "Worker did not become healthy after deploy."
          echo "Latest /api/worker-health payload:"
          curl -fsS "$AGORA_WORKER_HEALTH_URL" || true
          echo
          echo "Remote PM2 status and recent worker logs:"
          DO_WORKER_PORT="${DO_WORKER_PORT:-22}"
          DO_WORKER_PATH="${DO_WORKER_PATH:-/opt/agora}"
          DO_WORKER_PM2_NAME="${DO_WORKER_PM2_NAME:-agora-worker}"
          ssh -p "$DO_WORKER_PORT" "$DO_WORKER_USER@$DO_WORKER_HOST" \
            "set -euo pipefail; cd '$DO_WORKER_PATH'; pm2 status '$DO_WORKER_PM2_NAME' || true; pm2 logs '$DO_WORKER_PM2_NAME' --lines 100 --nostream || true"
          exit 1
