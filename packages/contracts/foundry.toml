[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
solc_version = "0.8.24"
via_ir = true
optimizer = true
optimizer_runs = 200
remappings = [
  "forge-std/=lib/forge-std/src/",
  "openzeppelin-contracts/=lib/openzeppelin-contracts/"
]

[rpc_endpoints]
base_sepolia = "${AGORA_BASE_SEPOLIA_RPC_URL}"

[fmt]
line_length = 100
